<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FROM TEXT TO FEELING | 감성 분석 서비스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">SENTIMENT.AI</div>
      <div class="status">SYSTEM ONLINE</div>
    </header>

    <main class="main">
      <section class="hero">
        <h1 class="title">FROM TEXT TO FEELING</h1>
        <p class="subtitle">문장을 입력하면 AI가 감성을 분석합니다.</p>
      </section>

      <section class="content-grid">
        <div class="input-panel panel">
          <h2 class="panel-title">분석할 텍스트</h2>
          <textarea id="text-input" placeholder="여기에 분석하고 싶은 문장을 입력하세요..."></textarea>
          <button id="analyze-btn" class="btn-primary">분석하기</button>
        </div>

        <div id="result-area" class="result-panel panel hidden">
          <h2 class="panel-title">분석 결과</h2>
          <div class="result-content">
            <div class="sentiment-badge" id="sentiment-display">긍정</div>
            <div class="confidence-container">
              <div class="confidence-bar-bg">
                <div id="confidence-bar" class="confidence-bar-fill"></div>
              </div>
              <span id="confidence-display">0%</span>
            </div>
            <p id="reason-display" class="reason"></p>
          </div>
        </div>
      </section>

      <div id="error-box" class="error-box hidden"></div>
      <div id="loader" class="loader hidden">분석 중...</div>
    </main>

    <footer class="footer">
      <p>&copy; 2024 FROM TEXT TO FEELING. All rights reserved.</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
